<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alumni Connect Pro</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>

    <style>
        :root { --primary: #4361ee; --secondary: #3f37c9; --bg: #f8f9fd; --white: #ffffff; --text: #2b2d42; --light-text: #8d99ae; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; color: var(--text); overflow-x: hidden; }
        
        /* Login Overlay - Starts as FLEX to ensure it's visible if not logged in */
        #login-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: white; z-index: 9999; display: flex; 
            flex-direction: column; align-items: center; justify-content: center; text-align: center; 
        }
        .login-card { background: white; padding: 40px 25px; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); max-width: 350px; width: 90%; }
        
        /* UI Components */
        .header-container { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; position: sticky; top: 0; z-index: 1000; border-radius: 0 0 20px 20px; }
        .user-bar { background: rgba(255, 255, 255, 0.1); padding: 10px 15px; font-size: 12px; display: flex; justify-content: space-between; align-items: center; }
        .user-bar img { width: 24px; height: 24px; border-radius: 50%; border: 1.5px solid white; }
        .main-header { padding: 15px; text-align: center; }
        
        .section { display: none; padding: 15px; max-width: 500px; margin: auto; animation: fadeIn 0.3s ease; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: var(--white); padding: 15px; border-radius: 16px; box-shadow: 0 5px 15px rgba(0,0,0,0.03); margin-bottom: 15px; border: 1px solid #f0f0f0; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #edf2f7; border-radius: 12px; box-sizing: border-box; }
        
        .btn { border: none; padding: 14px; border-radius: 12px; cursor: pointer; font-weight: 600; font-size: 14px; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s; }
        .btn-blue { background: var(--primary); color: white; width: 100%; }
        .btn-google { background: white; border: 1px solid #ddd; color: #333; width: 100%; }
        .btn-google:hover { background: #f9f9f9; }

        /* Navigation */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #eee; z-index: 1000; }
        .nav-item { border: none; background: none; color: var(--light-text); font-size: 11px; text-align: center; position: relative; }
        .active-nav { color: var(--primary); font-weight: bold; }
        
        #toast { visibility: hidden; min-width: 200px; background: #333; color: #fff; text-align: center; border-radius: 10px; padding: 12px; position: fixed; z-index: 10000; left: 50%; bottom: 100px; transform: translateX(-50%); }
        #toast.show { visibility: visible; }

        #chat-window { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg); z-index:2000; flex-direction: column; }
        #chat-messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; }
        .msg-bubble { padding: 10px; border-radius: 12px; margin-bottom: 8px; max-width: 75%; font-size: 14px; }
        .mine { align-self: flex-end; background: var(--primary); color: white; }
        .theirs { align-self: flex-start; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-card">
        <h2 style="color:var(--primary);">Alumni Connect</h2>
        <p style="color:gray; font-size:14px; margin-bottom:30px;">Reconnect with childhood friends for a happier life.</p>
        <button class="btn btn-google" onclick="loginWithGoogle()">
            <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" width="20"> Login with Google
        </button>
    </div>
</div>

<div id="toast">Message!</div>

<div class="header-container">
    <div class="user-bar">
        <div style="display:flex; align-items:center; gap:8px;">
            <img id="header-user-img" src="https://via.placeholder.com/24" alt="">
            <span id="header-user-name">Loading...</span>
        </div>
        <span id="header-group-tag">Offline</span>
    </div>
    <div class="main-header"><h3 id="page-title">Home Feed</h3></div>
</div>

<div id="feed" class="section active">
    <div class="card">
        <textarea id="msgInput" rows="2" placeholder="Share a happy memory..." style="width:100%; border:1px solid #eee; border-radius:10px; padding:10px;"></textarea>
        <button id="postBtn" class="btn btn-blue" style="margin-top:10px;" onclick="handleFeedPost()">Post Memory</button>
    </div>
    <div id="post-container"></div>
</div>

<div id="friends" class="section">
    <div class="card">
        <h4>🔍 Find Old Friends</h4>
        <input type="text" id="s-inst" placeholder="School/College Name">
        <input type="text" id="s-year" placeholder="Passout Year">
        <button class="btn btn-blue" onclick="searchAlumni()">Search</button>
    </div>
    <div id="my-friends-list"></div>
</div>

<div id="settings" class="section">
    <div class="card" style="text-align:center;">
        <img id="p-img-large" style="width:80px; height:80px; border-radius:50%; margin-bottom:15px; border:3px solid var(--primary);">
        <h3 id="p-name-display" style="margin:0;">User Name</h3>
        <p id="p-email-display" style="color:gray; font-size:12px; margin-bottom:20px;">email@gmail.com</p>
        <input type="text" id="p-inst" placeholder="Your School/College">
        <input type="text" id="p-year" placeholder="Passout Year">
        <button class="btn btn-blue" onclick="saveProfile()">Update Profile</button>
        <button class="btn" style="color:red; background:none; margin-top:20px; width:100%;" onclick="logout()">Logout</button>
    </div>
</div>

<div id="chat-window">
    <div class="header-container">
        <div class="main-header" style="text-align:left; padding:10px; display:flex; align-items:center;">
            <button onclick="closeChat()" style="background:none; border:none; color:white; font-size:24px; margin-right:15px;">←</button>
            <span id="chat-with-name" style="font-weight:bold;">Chat</span>
        </div>
    </div>
    <div id="chat-messages"></div>
    <div style="padding:15px; background:white; display:flex; gap:10px;">
        <input type="text" id="privateMsgInput" placeholder="Message..." style="margin:0;">
        <button class="btn btn-blue" style="width:50px; border-radius:50%;" onclick="sendPrivateMessage()">➤</button>
    </div>
</div>

<div class="nav-bar">
    <button class="nav-item active-nav" onclick="show('feed', 'Home Feed', this)">🏠<br>Feed</button>
    <button class="nav-item" onclick="show('friends', 'Friends', this)">👥<br>Friends</button>
    <button class="nav-item" onclick="show('settings', 'Settings', this)">⚙️<br>Settings</button>
</div>

<script src="app.js"></script>
</body>
</html>
