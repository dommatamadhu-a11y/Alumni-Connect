<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alumni Connect Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-messaging-compat.js"></script>
    
    <style>
        :root { --primary: #4361ee; --secondary: #3f37c9; --bg: #f8f9fd; --white: #ffffff; --text: #2b2d42; --light-text: #8d99ae; --success: #4cc9f0; }
        body { font-family: 'Inter', 'Segoe UI', sans-serif; background: var(--bg); margin: 0; color: var(--text); padding-bottom: 80px; }
        .header-container { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; position: sticky; top: 0; z-index: 1000; border-radius: 0 0 20px 20px; box-shadow: 0 4px 15px rgba(67, 97, 238, 0.3); }
        .user-bar { background: rgba(255, 255, 255, 0.1); padding: 6px 15px; font-size: 11px; display: flex; justify-content: space-between; backdrop-filter: blur(5px); }
        .main-header { padding: 12px; text-align: center; }
        .main-header h3 { font-weight: 700; margin: 0; }
        .section { display: none; padding: 20px; max-width: 500px; margin: auto; animation: fadeIn 0.4s ease; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .card { background: var(--white); padding: 18px; border-radius: 16px; box-shadow: 0 8px 20px rgba(0,0,0,0.04); margin-bottom: 20px; border: 1px solid rgba(0,0,0,0.02); }
        input, textarea { width: 100%; padding: 12px 15px; margin: 10px 0; border: 1.5px solid #edf2f7; border-radius: 12px; box-sizing: border-box; font-size: 14px; background: #fcfdfe; }
        .btn { border: none; padding: 12px; border-radius: 12px; cursor: pointer; font-weight: 600; width: 100%; transition: 0.3s; font-size: 14px; }
        .btn-blue { background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(67, 97, 238, 0.2); }
        .btn-green { background: var(--success); color: white; margin-top: 8px; }
        .btn-red { background: #ff4d6d; color: white; width: auto; padding: 6px 12px; font-size: 11px; border-radius: 8px; float: right; }
        .btn-logout { background: #f1f3f5; color: #fa5252; margin-top: 25px; border: 1px solid #ffe3e3; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: rgba(255,255,255,0.9); display: flex; justify-content: space-around; padding: 12px 0; backdrop-filter: blur(10px); border-top: 1px solid rgba(0,0,0,0.05); z-index: 1000; }
        .nav-item { border: none; background: none; color: var(--light-text); font-size: 11px; position: relative; cursor: pointer; text-align: center; }
        .active-nav { color: var(--primary); transform: translateY(-3px); }
        .dot { height: 10px; width: 10px; background-color: #ff4d6d; border-radius: 50%; display: none; position: absolute; top: -4px; right: 2px; border: 2px solid white; }
        #chat-window { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg); z-index:2000; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        #chat-messages { height:calc(100% - 140px); overflow-y:auto; padding:20px; display:flex; flex-direction:column; background: #f0f2f5; }
        .msg-bubble { padding: 10px 15px; border-radius: 18px; margin-bottom: 8px; max-width: 80%; font-size: 14px; }
        .mine { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 4px; }
        .theirs { align-self: flex-start; background: white; color: var(--text); border-bottom-left-radius: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        /* Notification Request UI */
        #notif-banner { background: #fff3cd; padding: 10px; font-size: 13px; text-align: center; display: none; border-bottom: 1px solid #ffeeba; }
    </style>
</head>
<body>

<div class="header-container">
    <div id="notif-banner">
        Enable Notifications for chat alerts! <button onclick="requestNotificationPermission()" style="background:var(--primary); color:white; border:none; padding:3px 8px; border-radius:5px;">Enable</button>
    </div>
    <div class="user-bar">
        <span id="header-user-name">Guest Mode</span>
        <span id="header-group-tag">Offline</span>
    </div>
    <div class="main-header">
        <h3 id="page-title">Home Feed</h3>
    </div>
</div>

<div id="feed" class="section active">
    <div class="card">
        <textarea id="msgInput" rows="2" placeholder="Share with group..."></textarea>
        <button class="btn btn-blue" onclick="sendPost()">Post to Wall</button>
    </div>
    <div id="post-container"></div>
</div>

<div id="friends" class="section">
    <div id="notifications-area" class="card" style="display:none; border-left: 4px solid var(--primary);">
        <h4 style="margin:0 0 10px 0;">New Requests</h4>
        <div id="request-list"></div>
    </div>
    <div class="card">
        <h4>🔍 Find Alumni</h4>
        <input type="text" id="s-inst" placeholder="School Name">
        <input type="text" id="s-year" placeholder="Year">
        <button class="btn btn-blue" onclick="searchAlumni()">Search</button>
    </div>
    <div id="search-results"></div>
    <div id="my-friends-list"></div>
</div>

<div id="profile" class="section">
    <div class="card">
        <h3>Settings</h3>
        <input type="text" id="p-name" placeholder="Name">
        <input type="text" id="p-inst" placeholder="Institution">
        <input type="text" id="p-year" placeholder="Year">
        <input type="text" id="p-city" placeholder="City">
        <button class="btn btn-blue" onclick="saveProfile()">Save Profile</button>
        <button class="btn btn-logout" onclick="logout()">Logout</button>
    </div>
</div>

<div id="chat-window">
    <div class="header-container">
        <div class="main-header" style="display:flex; align-items:center; text-align: left; padding: 15px;">
            <button onclick="closeChat()" style="background:none; border:none; color:white; font-size:24px; margin-right: 15px;">←</button>
            <span id="chat-with-name">Chat</span>
        </div>
    </div>
    <div id="chat-messages"></div>
    <div style="position:absolute; bottom:0; width:100%; padding:15px; background:white; display:flex; box-sizing:border-box;">
        <input type="text" id="privateMsgInput" placeholder="Message..." style="margin:0; border-radius:25px;">
        <button class="btn btn-blue" style="width:50px; border-radius:50%; margin-left:10px;" onclick="sendPrivateMessage()">➤</button>
    </div>
</div>

<div class="nav-bar">
    <button class="nav-item active-nav" onclick="show('feed', 'Home Feed', this)"><span>🏠</span><br>Feed</button>
    <button class="nav-item" id="nav-friends" onclick="show('friends', 'Friends', this)"><span class="dot" id="notif-dot"></span><span>👥</span><br>Friends</button>
    <button class="nav-item" onclick="show('profile', 'Profile', this)"><span>⚙️</span><br>Profile</button>
</div>

<script src="app.js"></script>
</body>
</html>
