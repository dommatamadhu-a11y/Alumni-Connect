<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alumni Connect Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --primary: #4361ee;
            --secondary: #3f37c9;
            --bg: #f8f9fd;
            --white: #ffffff;
            --text: #2b2d42;
            --light-text: #8d99ae;
            --success: #4cc9f0;
        }

        body { font-family: 'Inter', 'Segoe UI', sans-serif; background: var(--bg); margin: 0; color: var(--text); padding-bottom: 80px; }
        
        /* Header & User Bar */
        .header-container { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; position: sticky; top: 0; z-index: 1000; border-radius: 0 0 20px 20px; box-shadow: 0 4px 15px rgba(67, 97, 238, 0.3); }
        .user-bar { background: rgba(255, 255, 255, 0.1); padding: 6px 15px; font-size: 11px; display: flex; justify-content: space-between; backdrop-filter: blur(5px); }
        .main-header { padding: 12px; text-align: center; }
        .main-header h3 { font-weight: 700; letter-spacing: 0.5px; margin: 0; }

        .section { display: none; padding: 20px; max-width: 500px; margin: auto; animation: fadeIn 0.4s ease; }
        .active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Modern Cards */
        .card { background: var(--white); padding: 18px; border-radius: 16px; box-shadow: 0 8px 20px rgba(0,0,0,0.04); margin-bottom: 20px; border: 1px solid rgba(0,0,0,0.02); }
        
        input, textarea { width: 100%; padding: 12px 15px; margin: 10px 0; border: 1.5px solid #edf2f7; border-radius: 12px; box-sizing: border-box; font-size: 14px; transition: 0.3s; background: #fcfdfe; }
        input:focus { border-color: var(--primary); outline: none; background: #fff; box-shadow: 0 0 0 4px rgba(67, 97, 238, 0.1); }

        /* Buttons */
        .btn { border: none; padding: 12px; border-radius: 12px; cursor: pointer; font-weight: 600; width: 100%; transition: 0.3s; font-size: 14px; }
        .btn-blue { background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(67, 97, 238, 0.2); }
        .btn-blue:active { transform: scale(0.98); }
        .btn-green { background: var(--success); color: white; margin-top: 8px; }
        .btn-red { background: #ff4d6d; color: white; width: auto; padding: 6px 12px; font-size: 11px; border-radius: 8px; float: right; }
        .btn-logout { background: #f1f3f5; color: #fa5252; margin-top: 25px; border: 1px solid #ffe3e3; }

        /* Bottom Nav */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: rgba(255,255,255,0.9); display: flex; justify-content: space-around; padding: 12px 0; backdrop-filter: blur(10px); border-top: 1px solid rgba(0,0,0,0.05); z-index: 1000; }
        .nav-item { border: none; background: none; color: var(--light-text); font-size: 11px; position: relative; cursor: pointer; text-align: center; transition: 0.3s; }
        .active-nav { color: var(--primary); transform: translateY(-3px); }
        .active-nav b { font-weight: 700; }
        
        .dot { height: 10px; width: 10px; background-color: #ff4d6d; border-radius: 50%; display: none; position: absolute; top: -4px; right: 2px; border: 2px solid white; }

        /* Chat System */
        #chat-window { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg); z-index:2000; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        #chat-messages { height:calc(100% - 140px); overflow-y:auto; padding:20px; display:flex; flex-direction:column; background: #f0f2f5; }
        .msg-bubble { padding: 10px 15px; border-radius: 18px; margin-bottom: 8px; max-width: 80%; font-size: 14px; line-height: 1.4; position: relative; }
        .mine { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 4px; }
        .theirs { align-self: flex-start; background: white; color: var(--text); border-bottom-left-radius: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

        .search-item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f0f2f5; padding: 10px 0; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="header-container">
    <div class="user-bar">
        <span id="header-user-name">Guest Mode</span>
        <span id="header-group-tag">Offline</span>
    </div>
    <div class="main-header">
        <h3 id="page-title">Home Feed</h3>
    </div>
</div>

<div id="feed" class="section active">
    <div class="card">
        <textarea id="msgInput" rows="2" placeholder="Share something with your group..."></textarea>
        <button class="btn btn-blue" onclick="sendPost()">Post to Wall</button>
    </div>
    <div id="post-container"></div>
</div>

<div id="friends" class="section">
    <div id="notifications-area" class="card" style="display:none; border-left: 4px solid var(--primary);">
        <h4 style="margin:0 0 10px 0; font-size: 14px; color: var(--primary);">New Requests</h4>
        <div id="request-list"></div>
    </div>
    
    <div class="card">
        <h4 style="margin-top:0;">🔍 Find Alumni</h4>
        <input type="text" id="s-inst" placeholder="School/College Name">
        <input type="text" id="s-year" placeholder="Passout Year">
        <button class="btn btn-blue" onclick="searchAlumni()">Search Now</button>
    </div>
    
    <div id="search-results"></div>
    <h4 style="padding-left: 5px; color: var(--light-text); font-size: 14px;">MY CONNECTIONS</h4>
    <div id="my-friends-list"></div>
</div>

<div id="profile" class="section">
    <div class="card">
        <h3 style="margin-top:0;">Settings</h3>
        <label style="font-size: 12px; color: var(--light-text);">Full Name</label>
        <input type="text" id="p-name" placeholder="Enter your name">
        <label style="font-size: 12px; color: var(--light-text);">Institution</label>
        <input type="text" id="p-inst" placeholder="Ex: ZP High School">
        <label style="font-size: 12px; color: var(--light-text);">Batch Year</label>
        <input type="text" id="p-year" placeholder="Ex: 2015">
        <label style="font-size: 12px; color: var(--light-text);">City</label>
        <input type="text" id="p-city" placeholder="Ex: Hyderabad">
        <button class="btn btn-blue" style="margin-top:15px;" onclick="saveProfile()">Save Profile</button>
        <button class="btn btn-logout" onclick="logout()">Logout Account</button>
    </div>
</div>

<div id="chat-window">
    <div class="header-container">
        <div class="main-header" style="display:flex; align-items:center; text-align: left; padding: 15px;">
            <button onclick="closeChat()" style="background:none; border:none; color:white; font-size:24px; margin-right: 15px;">←</button>
            <span id="chat-with-name" style="font-weight:700; font-size:18px;">Chat</span>
        </div>
    </div>
    <div id="chat-messages"></div>
    <div style="position:absolute; bottom:0; width:100%; padding:15px; background:white; display:flex; box-sizing:border-box; border-top: 1px solid #eee;">
        <input type="text" id="privateMsgInput" placeholder="Write a message..." style="margin:0; border-radius:25px; background: #f8f9fa; border: 1px solid #eee;">
        <button class="btn btn-blue" style="width:60px; height:45px; margin-left:10px; border-radius:50%; display: flex; align-items: center; justify-content: center;" onclick="sendPrivateMessage()">➤</button>
    </div>
</div>

<div class="nav-bar">
    <button class="nav-item active-nav" onclick="show('feed', 'Home Feed', this)">
        <span style="font-size: 20px;">🏠</span><br><b>Feed</b>
    </button>
    <button class="nav-item" id="nav-friends" onclick="show('friends', 'Find Alumni', this)">
        <span class="dot" id="notif-dot"></span>
        <span style="font-size: 20px;">👥</span><br><b>Friends</b>
    </button>
    <button class="nav-item" onclick="show('profile', 'Settings', this)">
        <span style="font-size: 20px;">⚙️</span><br><b>Profile</b>
    </button>
</div>

<script src="app.js"></script>
</body>
</html>
