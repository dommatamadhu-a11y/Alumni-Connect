<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alumni Connect 🎓</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; margin: 0; padding: 15px; }
        .container { max-width: 500px; margin: auto; }
        .header { background: #007bff; color: white; padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 20px; }
        .post-box { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { background-color: #28a745; color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; cursor: pointer; font-size: 16px; font-weight: bold; }
        .post { background: white; padding: 15px; border-radius: 10px; margin-top: 15px; border-left: 5px solid #007bff; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        h4 { margin: 0; color: #007bff; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Alumni Connect</h1>
        <p>Stay Connected</p>
    </div>

    <div class="post-box">
        <input type="text" id="name" placeholder="Enter your name">
        <textarea id="message" rows="3" placeholder="Write a message..."></textarea>
        <button onclick="sendData()">Post to Wall</button>
    </div>

    <div id="post-feed">
        </div>
</div>

<script>
    // YOUR CORRECT FIREBASE CONFIG WITH ASIA SERVER
    const firebaseConfig = {
        apiKey: "AIzaSyAWZ2ky33M2U5xSWL-XSkU32y25U-Bwyrc",
        authDomain: "class-connect-b58f0.firebaseapp.com",
        projectId: "class-connect-b58f0",
        databaseURL: "https://class-connect-b58f0-default-rtdb.asia-southeast1.firebasedatabase.app/",
        storageBucket: "class-connect-b58f0.firebasestorage.app",
        messagingSenderId: "836461719745",
        appId: "1:836461719745:web:f827862e4db4954626a440"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // Function to Send Data
    function sendData() {
        const name = document.getElementById('name').value;
        const msg = document.getElementById('message').value;

        if (name !== "" && msg !== "") {
            database.ref('posts').push({
                username: name,
                text: msg,
                time: new Date().toLocaleString()
            }).then(() => {
                document.getElementById('message').value = ""; // Clear input
            }).catch((error) => {
                alert("Error: " + error.message);
            });
        } else {
            alert("Please enter both Name and Message!");
        }
    }

    // Function to Listen for Real-time Updates
    database.ref('posts').on('value', (snapshot) => {
        const feed = document.getElementById('post-feed');
        feed.innerHTML = "";
        const data = snapshot.val();
        
        if (data) {
            const posts = Object.values(data).reverse();
            posts.forEach(post => {
                feed.innerHTML += `
                    <div class="post">
                        <h4>👤 ${post.username}</h4>
                        <p>${post.text}</p>
                        <small style="color:#999">${post.time}</small>
                    </div>
                `;
            });
        } else {
            feed.innerHTML = "<p style='text-align:center; color:#888; margin-top:20px;'>No posts yet. Be the first!</p>";
        }
    });
</script>

</body>
</html>
